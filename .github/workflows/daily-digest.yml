name: Daily Digest

on:
  schedule:
    # 每天北京时间 09:00 (UTC 01:00)，早上起来看今天的日报
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          pip install pypinyin feedparser

      - name: Generate daily digest
        env:
          GHU_TOKEN: ${{ secrets.GHU_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PROJECT_DIR: ${{ github.workspace }}
        run: |
          python3 scripts/daily-digest.py

      - name: Commit & push JSON
        run: |
          git config user.name "xiaoxin-bot"
          git config user.email "bot@xiaoxin"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add public/data/ public/manifest.json public/search-index.json README.md || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git pull --rebase origin main
          git add public/data/ public/manifest.json public/search-index.json README.md || true
          git commit -m "daily: $(date +%Y-%m-%d)" || true
          git push origin main

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Astro site
        run: bun run astro build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
